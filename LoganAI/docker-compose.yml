version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: logan-ai-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - logan-ai-network

  server:
    build:
      context: ./server
    container_name: logan-ai-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/virtual-assistant
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_long_random_secret_key}
      - JWT_EXPIRES_IN=7d
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
    depends_on:
      - mongodb
    volumes:
      - server-uploads:/app/uploads
    networks:
      - logan-ai-network

  client:
    build:
      context: ./client
    container_name: logan-ai-client
    restart: unless-stopped
    ports:
      - '5173:80'
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    depends_on:
      - server
    networks:
      - logan-ai-network

networks:
  logan-ai-network:
    driver: bridge

volumes:
  mongo-data:
  server-uploads:
